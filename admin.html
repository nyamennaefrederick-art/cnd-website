<!DOCTYPE html>
<html>
<head>
<title>CND Orders Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
color:green;
text-align:center;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 8px #ccc;
}

button{
background:red;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.clear{
background:green;
width:100%;
margin-bottom:20px;
}
</style>

</head>

<body>

<h1>CND Customer Orders</h1>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">

<div style="background:white;padding:15px;border-radius:10px;flex:1;">
<b>Total Orders</b>
<p id="dashboardTotal">0</p>
</div>

<div style="background:white;padding:15px;border-radius:10px;flex:1;">
<b>Pending</b>
<p id="dashboardPending">0</p>
</div>

<div style="background:white;padding:15px;border-radius:10px;flex:1;">
<b>Completed</b>
<p id="dashboardCompleted">0</p>
</div>

</div>



<input id="searchOrder" type="text" placeholder="Search order..."
style="width:100%;padding:12px;margin-bottom:15px;border-radius:8px;border:1px solid #ccc;">


<div id="orders"></div>


<div id="sales" style="background:white;padding:15px;margin-top:15px;border-radius:10px;font-weight:bold;">
Total Sales: GHS 0
</div>


<div id="totalOrders" style="background:white;padding:15px;margin-top:15px;border-radius:10px;font-weight:bold;">
Total Orders: 0
</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpD5ShNaSByzGPxF1FlNGS0zgRZPAtnDg",
  authDomain: "cnd-data-bundle.firebaseapp.com",
  projectId: "cnd-data-bundle",
  storageBucket: "cnd-data-bundle.firebasestorage.app",
  messagingSenderId: "667849737543",
  appId: "1:667849737543:web:a8571f7123483b4765f862",
  measurementId: "G-PB7MHHHMYW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function showOrders(){

let box = document.getElementById("orders");

box.innerHTML = "";

let orders = [];

const querySnapshot = await getDocs(collection(db, "orders"));

querySnapshot.forEach((doc) => {

    orders.push({
        firestoreId: doc.id,
        ...doc.data()
    });

});
orders.sort((a,b) => {
    return new Date(b.date) - new Date(a.date);
});

if(orders.length === 0){

box.innerHTML="<p>No orders yet</p>";

return;

}
document.getElementById("totalOrders").innerHTML =
"Total Orders: " + orders.length;

document.getElementById("dashboardTotal").innerHTML = orders.length;

let pending = 0;
let completed = 0;

orders.forEach(function(order){

    if(order.status === "Completed"){
        completed++;
    } else {
        pending++;
    }

});
document.getElementById("dashboardPending").innerHTML = pending;
document.getElementById("dashboardCompleted").innerHTML = completed;
let totalSales = 0;

orders.forEach(function(order){

    totalSales += Number(order.price);

});

document.getElementById("sales").innerHTML =
"Total Sales: GHS " + totalSales.toFixed(2);
orders.forEach(function(order,index){

box.innerHTML += `

<div class="order">

<b>Order ID:</b> ${order.id}<br>
<b>Date:</b> ${order.date}<br>
<b>Name:</b> ${order.name}<br>
<b>Phone:</b> ${order.phone}<br>
<b>Network:</b> ${order.network}<br>
<b>Data:</b> ${order.data}<br>
<b>Price:</b> GHS ${order.price}<br>
<b>Status:</b> ${order.status || "Pending"}<br><br>

<button onclick="completeOrder('${order.firestoreId}')"
style="background:green;">
Mark Completed
</button>
<button onclick="deleteOrder('${order.firestoreId}')"
style="background:red;">
Delete Order
</button>
<button onclick="openWhatsApp('${order.phone}')"
style="background:#25D366;">
WhatsApp Customer
</button>

</div>

`;

});

}
async function completeOrder(id){

await updateDoc(doc(db, "orders", id), {
    status: "Completed"
});

showOrders();

}
window.completeOrder = completeOrder;


async function deleteOrder(id){

let confirmDelete = confirm("Delete this order?");

if(confirmDelete){

await deleteDoc(doc(db, "orders", id));

showOrders();

}

}

window.deleteOrder = deleteOrder;
function openWhatsApp(phone){

let message = "Hello, your CND Data Bundle order has been received.";

window.open(
"https://wa.me/" + phone + "?text=" + encodeURIComponent(message),
"_blank"
);

}

window.openWhatsApp = openWhatsApp;

document.getElementById("searchOrder").addEventListener("keyup",function(){

let value=this.value.toLowerCase();


document.querySelectorAll(".order").forEach(function(order){

if(order.innerText.toLowerCase().includes(value)){

order.style.display="block";

}else{

order.style.display="none";

}

});

});



let password = prompt("Enter Admin Password:");

if(password==="CND2026"){
    showOrders();
}else{
    document.body.innerHTML=
    "<h2 style='text-align:center;color:red;'>Access Denied</h2>";
}


</script>

</body>
</html>

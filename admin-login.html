<!DOCTYPE html>
<html>
<head>
<title>CND Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
}

button{
background:green;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="box">

<h2>CND Admin Login</h2>

<input id="email" type="email" placeholder="Admin Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<script type="module" src="admin-login.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>CND Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.box{
background:white;
max-width:400px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px #ccc;
}

input,button{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
}

input{
border:1px solid #ccc;
}

button{
background:green;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="box">

<h2>CND Admin Login</h2>

<input id="password" type="password" placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p id="message"></p>

</div>


<script>

function login(){

let password = document.getElementById("password").value;


if(password === "CND2026"){

localStorage.setItem("cndAdmin","logged");

window.location.href="admin.html";


}else{

document.getElementById("message").innerHTML=
"Wrong Password";

}

}

</script>

</body>
</html>

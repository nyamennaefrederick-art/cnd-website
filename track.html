<!DOCTYPE html>
<html>
<head>
<title>Track CND Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
color:green;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:green;
color:white;
font-size:16px;
}

.order{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 3px 8px #ccc;
}
</style>

</head>

<body>

<h1>Track Your CND Order</h1>

<input id="phone" placeholder="Enter your phone number">

<button onclick="trackOrder()">Check Order</button>

<div id="result"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDpD5ShNaSByzGPxF1FlNGS0zgRZPAtnDg",
authDomain: "cnd-data-bundle.firebaseapp.com",
projectId: "cnd-data-bundle",
storageBucket: "cnd-data-bundle.firebasestorage.app",
messagingSenderId: "667849737543",
appId: "1:667849737543:web:a8571f7123483b4765f862"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



async function trackOrder(){

let phone = document.getElementById("phone").value;

let result = document.getElementById("result");

result.innerHTML="Searching...";


const q = query(
collection(db,"orders"),
where("phone","==",phone)
);


const snapshot = await getDocs(q);


result.innerHTML="";


if(snapshot.empty){

result.innerHTML="<p>No order found.</p>";

return;

}


snapshot.forEach((doc)=>{


let order = doc.data();


result.innerHTML += `

<div class="order">

<b>Order ID:</b> ${order.id}<br>

<b>Date:</b> ${order.date}<br>

<b>Network:</b> ${order.network}<br>

<b>Package:</b> ${order.data}<br>

<b>Amount:</b> GHS ${order.price}<br>

<b>Status:</b> ${order.status}

</div>

`;


});


}


window.trackOrder = trackOrder;


</script>

</body>
</html>
